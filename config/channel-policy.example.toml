# channel-policy.example.toml
# Copy to config/channel-policy.toml and fill in real phone numbers.
# IMPORTANT: channel-policy.toml is in .gitignore — never commit real phone numbers.

[signal]
# The phone number signal-cli is linked to (your Zora bot number).
# Run: npx signal-sdk link --name "zora-agent" to link as secondary device.
phone_number = "+14155551234"
linked_device = true
daemon_port = 9200           # Internal JSON-RPC port for signal-cli daemon
auto_trust_new_identities = false   # Security: require explicit allowlisting

[channels.prompt_injection]
enabled = true
scanner_url = "http://localhost:8000"  # llm-guard REST API (optional)
block_on_high_risk = true

[channels.quarantine]
enabled = true
# Quarantine LLM processes raw channel input; no tool access
model = "claude-haiku-4-5-20251001"  # Cheaper/faster model for intent extraction

# ─── TRUST DEFINITIONS ───────────────────────────────────────────────────────
# Add one [[channel_policy.users]] block per trusted contact.
# Channels: ["all"] for any channel, or ["group:UUID"] for specific groups.
# Roles: trusted_admin | trusted_user | read_only | denied

[[channel_policy.users]]
# Trusted admin: full access from any channel
phone = "+14085551234"
name = "Owner (you)"
channels = ["all"]
role = "trusted_admin"

[[channel_policy.users]]
# Trusted user: write access in specific group, read-only in DMs
phone = "+16505551234"
name = "Trusted Collaborator"
channels = ["group:replace-with-real-group-uuid"]
role = "trusted_user"
dm_role = "read_only"       # Override role for direct messages

[[channel_policy.users]]
# Read-only collaborator
phone = "+16195551234"
name = "Read-Only Contact"
channels = ["group:replace-with-real-group-uuid"]
role = "read_only"

# ─── CAPABILITY SET DEFINITIONS ──────────────────────────────────────────────
# Define what each role is allowed to do.
# tools: list of Zora tool names the role can use.
# destructive_ops: if false, write/delete operations are dry-run previews.
# action_budget: max tool calls per task.

[capability_sets.trusted_admin]
tools = [
  "read_file", "write_file", "edit_file",
  "bash", "glob", "grep",
  "web_search", "web_fetch",
  "memory_search", "memory_save",
  "task"
]
destructive_ops = true
action_budget = 100

[capability_sets.trusted_user]
tools = [
  "read_file", "write_file",
  "web_search", "web_fetch",
  "memory_search"
]
destructive_ops = false
action_budget = 30

[capability_sets.read_only]
tools = [
  "read_file", "web_search", "web_fetch",
  "memory_search"
]
destructive_ops = false
action_budget = 10

[capability_sets.denied]
tools = []
destructive_ops = false
action_budget = 0
